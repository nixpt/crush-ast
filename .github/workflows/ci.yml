name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake pkg-config

      - name: Install rust toolchain
        run: rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-check

      - name: cargo check
        run: cargo check --workspace

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake pkg-config

      - name: Install rust toolchain
        run: rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test

      - name: cargo test (excl. known fail)
        run: cargo test --workspace --exclude walker-core
