name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake pkg-config

      - name: Install rust toolchain
        run: rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Checkout exosphere sibling (mesh-proto path dep)
        uses: actions/checkout@v4
        with:
          repository: nixpt/exosphere
          path: ../exosphere

        with:
          shared-key: ci-check

      - name: cargo check
        run: cargo check --workspace

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake pkg-config

      - name: Install rust toolchain
        run: rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Checkout exosphere sibling (mesh-proto path dep)
        uses: actions/checkout@v4
        with:
          repository: nixpt/exosphere
          path: ../exosphere

        with:
          shared-key: ci-test

      - name: cargo test (excl. known fail)
        run: cargo test --workspace --exclude walker-core

  wasm:
    # Enforces the "portable, multi-target" guarantee: the IR / VM / frontend /
    # SDK core must keep building for wasm32 (walkers + crush-python are host-only
    # subprocess/PyO3 binaries and are intentionally excluded).
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake pkg-config

      - name: Install rust toolchain + wasm32 target
        run: |
          rustup show
          rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-wasm

      - name: cargo build (portable core, wasm32)
        run: |
          cargo build --target wasm32-unknown-unknown \
            -p crush-errors -p crush-cast -p casm \
            -p crush-vm -p crush-frontend -p crush-lang-sdk

      - name: xtask audit (SCALAR + COMPOSITE destructure-bind smoke)
        run: |
          cargo build -p xtask --release || cargo build -p xtask
          cargo run -p xtask -- audit


  lint-dejavue:
    name: lint dejavue timeline (future-preventive)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: checkout
      uses: actions/checkout@v3
    - name: clone exosphere (xtask sibling path-dep)
      uses: actions/checkout@v3
      with:
        repository: nixpt/exosphere
        path: ../exosphere
    - name: show rust toolchain
      run: rustup show
    - name: rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: lint-dejavue
    - name: lint dejavue timeline
      run: cargo run -p xtask --bin lint-dejavue
