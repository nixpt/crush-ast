name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'agent/**']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ── Fast feedback: type-check the whole workspace ──────────────────────────
  check:
    name: Check (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nixpt/buckets
          path: buckets
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo check --workspace \
            --exclude crush-python \
            --exclude crush-lang-custom \
            2>&1

  # ── Core VM + compiler tests ────────────────────────────────────���─────────
  test-core:
    name: Test (core)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nixpt/buckets
          path: buckets
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo test \
            -p crush-walker-core \
            -p crush-vm \
            -p crush-cast \
            -p casm \
            -p crush-frontend \
            --lib 2>&1

  # ── All language SDK tests ────────────────────────────────────────────────
  test-languages:
    name: Test (walkers)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nixpt/buckets
          path: buckets
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo test \
            -p crush-lang-python \
            -p crush-lang-js \
            -p crush-lang-rust \
            -p crush-lang-c \
            -p crush-lang-bash \
            -p crush-lang-zsh \
            -p crush-lang-nepali \
            -p crush-lang-go \
            -p crush-lang-zig \
            -p crush-lang-dart \
            --lib 2>&1

  # ── Linting (non-blocking) ────────────────────────────────────────────────
  lint:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nixpt/buckets
          path: buckets
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo clippy --workspace \
            --exclude crush-python \
            --exclude crush-lang-custom \
            -- -D warnings 2>&1 || true

  # ── Release build compiles (no LTO, just verify release profile works) ────
  build-release:
    name: Build (release)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nixpt/buckets
          path: buckets
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo build --release \
            -p crush-aot \
            -p crush-vm \
            -p crush-lang-sdk \
            -p crush-lang-python \
            -p crush-lang-js \
            -p crush-lang-rust \
            -p crush-lang-c \
            -p crush-lang-bash \
            -p crush-lang-go \
            -p crush-lang-zig \
            -p crush-lang-dart \
            2>&1

  # ── Feature-gate smoke tests ──────────────────────────────────────────────
  feature-gates:
    name: Feature gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    strategy:
      matrix:
        args: ["--no-default-features", "--all-features"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nixpt/buckets
          path: buckets
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo check --workspace \
            --exclude crush-python \
            --exclude crush-lang-custom \
            ${{ matrix.args }} 2>&1 || true
