[package]
name = "crush-vm"
version.workspace = true
edition = "2024"
repository.workspace = true
homepage.workspace = true
description = "CVM1 binary bytecode assembler, disassembler, and sandboxed interpreter — standalone Crush runtime outside exosphere"
license.workspace = true
readme = "README.md"
keywords = ["crush", "vm", "bytecode", "interpreter", "sandbox"]
categories = ["compilers"]

[[bin]]
name = "crush-vm"
path = "src/main.rs"

[lib]
name = "crush_vm"
crate-type = ["lib", "cdylib"]

[dependencies]
anyhow.workspace = true
casm.workspace = true
hex = "0.4"
crush-errors.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
# Canonical NDJSON wire-format helpers (DiagRecord + diag_line +
# diag_line_from + wants_json). Replaces the previously inlined
# seven-field-shape trio in `src/main.rs::tests`; canonical wire-
# format lockdown lives in `crates/crush-diagnostics/tests/wire_format.rs`.
crush-diagnostics.workspace = true
parking_lot = "0.12.5"
pyo3 = { version = "0.22", features = ["extension-module"], optional = true }

# Native-only: ONNX inference (ai_optimizer), dynamic plugin loading (plugin,
# via crush-ffi's C-ABI contract), and the `os.cargo` subprocess capability
# (cargo_cap). None of these have a wasm32 story — ort needs a native ONNX
# runtime, libloading needs a real dynamic linker, cargo_cap needs a real
# `cargo` binary to spawn. Gated so `crush-web` (browser target) can build
# with `default-features = false`.
ort = { version = "2.0.0-rc.12", optional = true }
libloading = { version = "0.9.0", optional = true }
crush-ffi = { version = "0.3.0", path = "../crush-ffi", optional = true }

[features]
default = ["native-plugins"]
python = ["dep:pyo3"]
native-plugins = ["dep:ort", "dep:libloading", "dep:crush-ffi"]

# `EXEC_LANG`'s wall-clock timeout must kill a polyglot subprocess's whole
# process GROUP, not just the single tracked PID: `bash -c "sleep 30"`
# forks `sleep` as bash's own child, which inherits bash's stdout/stderr
# pipe fds — killing bash alone leaves `sleep` running and still holding
# those fds open, so the pipe never sees EOF. `std::process::Command` has
# no "kill the process group" primitive, only single-PID `Child::kill()`.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
