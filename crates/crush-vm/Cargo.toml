[package]
name = "crush-vm"
version = "0.2.0"
edition = "2024"
description = "CVM1 binary bytecode assembler, disassembler, and sandboxed interpreter — standalone Crush runtime outside exosphere"
license = "MIT OR Apache-2.0"

[[bin]]
name = "crush-vm"
path = "src/main.rs"

[dependencies]
serde     = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"

[dev-dependencies]
