[package]
name = "crush-vm"
version.workspace = true
edition = "2024"
repository.workspace = true
homepage.workspace = true
description = "CVM1 binary bytecode assembler, disassembler, and sandboxed interpreter — standalone Crush runtime outside exosphere"
license.workspace = true
readme = "README.md"
keywords = ["crush", "vm", "bytecode", "interpreter", "sandbox"]
categories = ["compilers"]

[[bin]]
name = "crush-vm"
path = "src/main.rs"

[lib]
name = "crush_vm"
crate-type = ["lib", "cdylib"]

[dependencies]
anyhow.workspace = true
casm.workspace = true
hex = "0.4"
crush-errors.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
# Canonical NDJSON wire-format helpers (DiagRecord + diag_line +
# diag_line_from + wants_json). Replaces the previously inlined
# seven-field-shape trio in `src/main.rs::tests`; canonical wire-
# format lockdown lives in `crates/crush-diagnostics/tests/wire_format.rs`.
crush-diagnostics.workspace = true
ort = "2.0.0-rc.12"
parking_lot = "0.12.5"
libloading = "0.9.0"
crush-ffi = { version = "0.2.0", path = "../crush-ffi" }

# `EXEC_LANG`'s wall-clock timeout must kill a polyglot subprocess's whole
# process GROUP, not just the single tracked PID: `bash -c "sleep 30"`
# forks `sleep` as bash's own child, which inherits bash's stdout/stderr
# pipe fds — killing bash alone leaves `sleep` running and still holding
# those fds open, so the pipe never sees EOF. `std::process::Command` has
# no "kill the process group" primitive, only single-PID `Child::kill()`.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
