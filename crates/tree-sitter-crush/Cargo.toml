[package]
license.workspace = true
description = "Tree-sitter grammar for the Crush programming language"
name = "tree-sitter-crush"
version.workspace = true
edition = "2021"
repository.workspace = true
homepage.workspace = true
readme = "README.md"
keywords = ["tree-sitter", "crush", "grammar", "parser"]
categories = ["parser-implementations"]
exclude = ["crush.so"]

[lib]
path = "src/lib.rs"

[dependencies]
tree-sitter = "0.25"
tree-sitter-language = "0.1"

[build-dependencies]
cc = "1.0"
