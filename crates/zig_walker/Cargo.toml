[package]
name = "zig_walker"
version = "0.1.0"
edition = "2021"
description = "Zig to CAST walker for CRUSH"
license = "MIT OR Apache-2.0"

[[bin]]
name = "zig_walker"
path = "src/main.rs"

[dependencies]
crush-cast = { path = "../crush-cast" }
tree-sitter = "0.25"
tree-sitter-zig = "1.1"
clap = { version = "4", features = ["derive"] }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
