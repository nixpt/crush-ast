[package]
name = "crush-pkg"
version = "0.2.0"
edition = "2024"
description = "Crush language package manager — cargo-like build tool for Crush programs"
license = "MIT OR Apache-2.0"

[[bin]]
name = "crush-pkg"
path = "src/main.rs"

[dependencies]
crush-vm = { path = "../crush-vm" }
crush-cast = { path = "../crush-cast" }
casm = { path = "../casm" }
crush-frontend = { path = "../crush-frontend" }
crush-lang-sdk = { path = "../crush-lang-sdk" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
anyhow = "1.0"
thiserror = "1.0"
clap = { version = "4.0", features = ["derive"] }
walkdir = "2.5"
zip = "0.6"

[dev-dependencies]
tempfile = "3"
