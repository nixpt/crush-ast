[package]
name = "crush-pkg"
version.workspace = true
edition = "2024"
repository.workspace = true
description = "Crush language package manager — cargo-like build tool for Crush programs"
readme = "../../README.md"
license.workspace = true

[[bin]]
name = "crush-pkg"
path = "src/main.rs"

[dependencies]
crush-vm.workspace = true
crush-cast.workspace = true
casm.workspace = true
crush-frontend.workspace = true
crush-lang-sdk.workspace = true
crush-diagnostics.workspace = true
serde.workspace = true
serde_json.workspace = true
toml = "0.8"
anyhow.workspace = true
thiserror.workspace = true
clap.workspace = true
walkdir = "2.5"
zip = "0.6"
tar = "0.4"
flate2 = "1.0"
ed25519-dalek = { version = "2", features = ["rand_core"] }
sha2 = "0.10"
hex = "0.4"
rand = "0.8"
bincode = "1.3"
chrono = { version = "0.4", features = ["serde"] }

# Pinned-toolchain, sandboxed execution for script capsules (ScriptRunner) —
# resolves node/python/bun/deno instead of shelling out to whatever happens
# to be on the host PATH. Peer path-dep, flat projects/ layout.
buckets = { path = "../../../buckets", package = "crush-buckets", version = "0.1.0" }

[dev-dependencies]
tempfile = "3"
