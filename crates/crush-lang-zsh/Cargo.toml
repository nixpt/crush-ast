[package]
name = "crush-lang-zsh"
version.workspace = true
edition = "2024"
description = "Zsh language support for Crush — parser backed by zshrs-parse (direct port of zsh's lex.c+parse.c)"
readme = "../../README.md"
license.workspace = true
repository.workspace = true

[[bin]]
name = "zsh_walker"
path = "src/bin/walker.rs"

[dependencies]
crush-cast.workspace = true
crush-walker-core.workspace = true
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
zshrs-parse = "0.10"

[dev-dependencies]
crush-frontend = { path = "../crush-frontend", version = "0.3.0" }
crush-lang-sdk = { path = "../crush-lang-sdk", version = "0.3.0" }
crush-vm = { path = "../crush-vm", version = "0.3.0" }
