[package]
name = "crush-python"
version = "0.2.0"
edition = "2024"
description = "Python bindings for crush-cast — parse and validate CAST IR from Python"
license.workspace = true
repository.workspace = true

[lib]
name = "crush_python"
crate-type = ["cdylib", "rlib"]

[dependencies]
crush-cast.workspace = true
serde_json.workspace = true
pyo3 = { version = "0.23", features = ["abi3", "abi3-py311"] }

[features]
default = ["extension-module"]
extension-module = ["pyo3/extension-module"]

