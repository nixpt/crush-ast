[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "crush-python"
version = "0.2.0"
description = "Python bindings for crush-cast — Crush AST IR"
license = "MIT OR Apache-2.0"

[tool.maturin]
features = ["pyo3/extension-module", "pyo3/abi3", "pyo3/abi3-py311"]
