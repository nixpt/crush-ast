[package]
name = "crush-macros"
version = "0.2.0"
edition = "2024"
description = "Proc macros for embedding Crush code at compile time in Rust"
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme = "README.md"
keywords = ["crush", "macro", "proc-macro", "embedding"]
categories = ["development-tools", "compilers"]

[lib]
proc-macro = true

[dependencies]
crush-frontend.workspace = true
casm.workspace = true
serde_json.workspace = true
proc-macro2 = "1"
quote = "1"
syn = { version = "2", features = ["full", "extra-traits"] }

[dev-dependencies]
crush-vm.workspace = true
