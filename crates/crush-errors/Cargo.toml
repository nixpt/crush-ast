[package]
name = "crush-errors"
version = "0.1.0"
edition = "2024"
description = "Unified error types for the CRUSH runtime"
license = "MIT OR Apache-2.0"

[dependencies]
thiserror = "1.0"
regex = "1.0"
# VER-05: the unified `VersionMismatch` doubles as the audit payload, so it
# must serialize with its `boundary` discriminant. serde is already universal
# across the workspace — no new external dependency enters the graph here.
serde = { version = "1.0", features = ["derive"] }

[dev-dependencies]
serde_json = "1.0"
