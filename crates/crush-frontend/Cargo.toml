[package]
name = "crush-frontend"
version = "0.2.0"
edition = "2024"
description = "Portable Crush language frontend: parser, semantic analyzer, optimizer, and CASM compiler"
license = "MIT OR Apache-2.0"

[dependencies]
crush-cast = { path = "../crush-cast" }
casm = { path = "../casm" }
crush-errors = { path = "../crush-errors" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "1.0"
